#:schema node_modules/wrangler/config-schema.json
name = "uomtiles"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Static assets (preview HTML/CSS/JS). Served via env.ASSETS.fetch().
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"

# Public configuration — override locally via `wrangler.toml` overrides or env
[vars]
PMTILES_KEY = "uom-shifei.pmtiles"
DJI_KEY = "dji.geojson"
ALLOWED_ORIGINS = "*"
CACHE_CONTROL = "public, max-age=31536000, immutable"

# R2 bucket binding. Bucket must be created by user via `wrangler r2 bucket create`.
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "uomtiles"
preview_bucket_name = "uomtiles-preview"

# Custom domain. Cloudflare-managed DNS zone "zzi.su" required.
# Fork users: replace with your own domain or remove this section to use
# the default *.workers.dev hostname.
[[routes]]
pattern = "uom.zzi.su"
custom_domain = true

# TIANDITU_TOKEN is a SECRET, set via:
#   wrangler secret put TIANDITU_TOKEN
# It will appear as env.TIANDITU_TOKEN at runtime. NOT in this file.

[observability]
enabled = true
