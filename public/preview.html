<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#1a1d22">
  <title>UOM 适飞空域</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
  <link rel="stylesheet" href="/preview.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <div id="map"></div>

  <div id="search-wrap" class="hidden" data-collapsed="false">
    <button id="search-icon" type="button" aria-label="搜索">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16.102 17.162a8 8 0 1 1 1.06-1.06l4.618 4.618a.75.75 0 1 1-1.06 1.06zM17.5 11a6.5 6.5 0 1 0-13 0a6.5 6.5 0 0 0 13 0"/></svg>
    </button>
    <input id="search-input" type="search" placeholder="搜索地点" autocomplete="off">
    <div id="search-results"></div>
  </div>

  <aside id="controls" class="collapsed init-no-transition">
    <header class="ctrl-head" id="ctrl-head">
      <span class="title">图层</span>
      <span class="actions">
        <button class="ico-btn theme-toggle" id="theme-toggle" type="button" aria-label="主题切换" title="主题切换">
          <svg class="theme-ico theme-system" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2S2 6.477 2 12s4.477 10 10 10m0-1.5v-17a8.5 8.5 0 0 1 0 17"/></svg>
          <svg class="theme-ico theme-light" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 2m0 15a5 5 0 1 0 0-10a5 5 0 0 0 0 10m0-1.5a3.5 3.5 0 1 1 0-7a3.5 3.5 0 0 1 0 7m9.25-2.75a.75.75 0 0 0 0-1.5h-1.5a.75.75 0 0 0 0 1.5zM12 19a.75.75 0 0 1 .75.75v1.5a.75.75 0 0 1-1.5 0v-1.5A.75.75 0 0 1 12 19m-7.75-6.25a.75.75 0 0 0 0-1.5h-1.5a.75.75 0 0 0 0 1.5zm-.03-8.53a.75.75 0 0 1 1.06 0l1.5 1.5a.75.75 0 0 1-1.06 1.06l-1.5-1.5a.75.75 0 0 1 0-1.06m1.06 15.56a.75.75 0 1 1-1.06-1.06l1.5-1.5a.75.75 0 1 1 1.06 1.06zm14.5-15.56a.75.75 0 0 0-1.06 0l-1.5 1.5a.75.75 0 0 0 1.06 1.06l1.5-1.5a.75.75 0 0 0 0-1.06m-1.06 15.56a.75.75 0 1 0 1.06-1.06l-1.5-1.5a.75.75 0 1 0-1.06 1.06z"/></svg>
          <svg class="theme-ico theme-dark" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.026 17.001c-2.762 4.784-8.879 6.423-13.663 3.661A10 10 0 0 1 3.13 17.68a.75.75 0 0 1 .365-1.132c3.767-1.348 5.785-2.91 6.956-5.146c1.233-2.353 1.551-4.93.689-8.463a.75.75 0 0 1 .769-.927a9.96 9.96 0 0 1 4.457 1.327c4.784 2.762 6.423 8.879 3.66 13.662m-8.247-4.903c-1.252 2.389-3.312 4.1-6.818 5.499a8.5 8.5 0 0 0 2.152 1.766a8.502 8.502 0 0 0 8.502-14.725a8.5 8.5 0 0 0-2.792-1.015c.647 3.384.23 6.043-1.045 8.475"/></svg>
        </button>
        <span class="chev" aria-hidden="true">
          <svg viewBox="0 0 20 20" width="12" height="12" fill="currentColor"><path d="M15.854 7.646a.5.5 0 0 1 .001.707l-5.465 5.484a.55.55 0 0 1-.78 0L4.147 8.353a.5.5 0 1 1 .708-.706L10 12.812l5.147-5.165a.5.5 0 0 1 .707-.001"/></svg>
        </span>
      </span>
    </header>

    <div class="ctrl-body"><div class="inner">

      <section class="section">
        <h4 class="section-label">底图</h4>
        <div id="basemap-list"></div>
      </section>

      <section class="section">
        <h4 class="section-label">UOM 适飞</h4>
        <label class="toggle-row">
          <input type="checkbox" id="uom-toggle" checked>
          <span class="check"></span>
          <span class="lbl">显示</span>
        </label>
        <div class="slider-row">
          <input type="range" id="uom-alpha" min="0" max="100" value="60">
          <span class="val"><span id="alpha-val">60</span>%</span>
        </div>
        <div class="swatches" id="color-swatches"></div>
      </section>

      <section class="section">
        <h4 class="section-label">DJI 限飞</h4>
        <label class="toggle-row">
          <input type="checkbox" id="dji-toggle" checked>
          <span class="check"></span>
          <span class="lbl">显示</span>
        </label>
        <div class="dji-legend">
          <span style="--c:#ff6b6b">禁飞</span>
          <span style="--c:#feca57">警告 / 授权</span>
          <span style="--c:#48dbfb">推荐</span>
        </div>
      </section>

      <section class="section" id="offline-section">
        <h4 class="section-label">离线</h4>
        <div class="offline-status" id="offline-status">检测中…</div>
        <div class="offline-progress hidden" id="offline-progress">
          <div class="bar"><div class="fill" id="offline-bar"></div></div>
          <span class="pct" id="offline-pct">0%</span>
        </div>
        <div class="offline-buttons">
          <button class="btn-link" id="offline-download" type="button">下载离线数据</button>
          <button class="btn-link warn hidden" id="offline-purge" type="button">删除</button>
          <button class="btn-link hidden" id="offline-install" type="button">安装到桌面</button>
        </div>
      </section>

      <section class="section">
        <button class="link-btn" id="open-settings" type="button">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M18.25 7a1.25 1.25 0 1 1-2.5 0a1.25 1.25 0 0 1 2.5 0M15.5 2.05A6.554 6.554 0 0 0 8.95 8.6c0 .387.05.76.11 1.104a.28.28 0 0 1-.07.244l-6.235 6.236a2.75 2.75 0 0 0-.806 1.944V20.3c0 .966.784 1.75 1.75 1.75h2.5a1.75 1.75 0 0 0 1.75-1.75v-1.25H9.7c.69 0 1.25-.56 1.25-1.25v-1.75h1.75a1.25 1.25 0 0 0 1.25-1.204c.496.128 1.02.204 1.55.204a6.554 6.554 0 0 0 6.55-6.55c0-3.631-2.953-6.45-6.55-6.45M10.45 8.6a5.054 5.054 0 0 1 5.05-5.05c2.802 0 5.05 2.181 5.05 4.95a5.054 5.054 0 0 1-5.05 5.05c-.68 0-1.38-.171-2.005-.44a.75.75 0 0 0-1.046.69v.75H10.7c-.69 0-1.25.56-1.25 1.25v1.75H7.7c-.69 0-1.25.56-1.25 1.25v1.5a.25.25 0 0 1-.25.25H3.7a.25.25 0 0 1-.25-.25v-2.172c0-.331.132-.65.366-.884l6.236-6.235a1.77 1.77 0 0 0 .486-1.564a5 5 0 0 1-.088-.845"/></svg>
          POI 搜索设置
        </button>
      </section>

    </div></div>
  </aside>

  <div id="settings-overlay" role="dialog" aria-modal="true">
    <div id="settings-panel">
      <h3>POI 搜索</h3>
      <p>需要 高德 Web Service Key (免费，<a href="https://lbs.amap.com/api/webservice/create-project-and-key" target="_blank" rel="noopener">点此申请</a>)。创建应用 → 选择 <em>Web 服务</em>，复制 32 位 Key。</p>
      <p class="dim">仅存储在浏览器 localStorage，不上传服务端。</p>
      <label class="field">
        <span>Key</span>
        <input id="amap-key-input" type="text" placeholder="abcd1234… 32 位" autocomplete="off">
      </label>
      <div class="btns">
        <button class="btn-ghost" id="amap-key-clear" type="button">清除</button>
        <button class="btn-ghost" id="amap-key-cancel" type="button">取消</button>
        <button class="btn-primary" id="amap-key-save" type="button">保存</button>
      </div>
    </div>
  </div>

  <script>
    // Apply theme + initial drawer state before paint to avoid FOUC.
    (function(){
      var t = localStorage.getItem("uomtiles.theme") || "system";
      document.documentElement.dataset.theme = t;
      var isMobile = window.matchMedia("(max-width: 640px)").matches;
      var c = document.getElementById("controls");
      if (c && !isMobile) c.classList.remove("collapsed");
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          c && c.classList.remove("init-no-transition");
        });
      });
    })();
    // Capture install prompt for the "安装到桌面" button.
    window.__uomDeferredPrompt = null;
    window.addEventListener("beforeinstallprompt", function(e){
      e.preventDefault();
      window.__uomDeferredPrompt = e;
      var btn = document.getElementById("offline-install");
      if (btn) btn.classList.remove("hidden");
    });
    // Register service worker (background).
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function(){
        navigator.serviceWorker.register("/sw.js").catch(function(){});
      });
    }
  </script>
  <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/maplibre-gl-raster-reprojection@1.0.4/dist/maplibre-gl-raster-reprojection.umd.cjs"></script>
  <script src="https://unpkg.com/pmtiles@4.3.0/dist/pmtiles.js"></script>
  <script src="/offline.js"></script>
  <script src="/preview.js" defer></script>
</body>
</html>
